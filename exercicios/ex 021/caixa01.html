<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1 {
            display: inline;

            background-color: lightgreen;
            height: 120px;
            width: 300px;

            border: 10px solid darkgreen;

            padding: 10px 35px;

            margin: 10px 26px;

            outline:5px dashed rgb(2, 148, 173)
        }

        a { 
            display: block;
            border:10px solid red;

            padding:10px 10px 10px 10px;

            margin: 18px 28px 18px 28px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Páragrafos tambem são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>Vamos ver como tudo isso funciona</p>
    
</body>
</html>
